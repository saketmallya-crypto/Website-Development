<!DOCTYPE html>
<html>
    <head>
        <title>
            Image Animation
        </title>
        <style>
            body{
                background-image: url(paper.jpeg);
                background-repeat:space;
                animation:Image_Animations 5s ease infinite;
            }
            @keyframes Image_Animations{
                from{
                    background-position:0% 100%;
                }
                to{
                    background-position:100% 0%;
                }
            }
        </style>
    </head>
    <body>

    </body>
</html>
