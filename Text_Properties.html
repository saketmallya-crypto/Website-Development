<!DOCTYPE html>
<html>
<head>'
    <title>
        Text Properties
    </title>
    <style>
        h1{/*Text Transform*/
            text-transform: capitalize;
            text-decoration:underline overline line-through;
        }
        h2{
            /*Text Shadow*/
            text-shadow: 2px 2px 4px orange;
        }
        #box1:hover{
            width:100px;
            height:100px;
            box-shadow: 4px 4px 5px orangered;
            text-indent: 20%;
            transform:rotateY(180deg);
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <h1> Saket Mallya</h1>
    <h2> Text Shadow</h2>
    <div id="box1">
        I am a box 
    </div>
</body>
</html>
