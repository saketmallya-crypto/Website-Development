<!DOCTYPE html>
<html>
    <head>
        <title>Typography</title>
        <style>
            #Saket{
                font-family: Arial, Helvetica, sans-serif;
            }
            #sans{
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            }
            #mono{
                font-family: 'Courier New', Courier, monospace;
            }
            p{
                font-style: italic;
                font-size: 40px;
                font-weight: lighter;
                text-align: justify;
                line-height: 2;
            }
        </style>
    </head>
    <body>
        <h1 id="Saket">
            I am Saket.
        </h1>
        <h1 id="sans"> I am sans serif.</h1>
        <h1 id="mono">I am monospace</h1>
        <p> 
            I am a paragraph tag where i will be trying out different typography styles to make your website more beautiful.
        </p>
    </body>
</html>
