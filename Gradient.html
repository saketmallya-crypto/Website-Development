<!DOCTYPE html>
<html>
    <head>
        <title>
            Gradients
        </title>
        <style>
            #box1{
                width:500px;
                height: 500px;
                background:linear-gradient(pink,yellow,beige
                )
            }
            #box2{
                width:500px;
                height:500px;
                background:linear-gradient(45deg,pink,yellow,beige)
            }
            #box3{
                 width:500px;
                height:500px;
                background:radial-gradient(yellow 25%,orange 30%,red 45%)
            }
        </style>
        
    </head>
    <body>
        <div>
            <div id="box1">
                I am linear gradient
            </div>
        </div>
           <div id="box2">
                I am linear gradient L-R
            </div>
        </div>
        <div id="box3">
                I am radial gradient
            </div>
        
    </body>
</html>
