<!DOCTYPE html>
<html>
    <head>
        <title>Animation</title>
        <style>
            .box{
                width:200px;
                height:150px;
                background-color: aquamarine;
                opacity:0.5;
                position:relative;
                animation:Move-box 10s infinite;
                 
            }
            @keyframes Move-box{
                from{
                    left:0px;
                }
                to{
                    left:500px;
                }
            }
        </style>

    </head>
    <body>
        <div class="box">

        </div>
    </body>
</html>
