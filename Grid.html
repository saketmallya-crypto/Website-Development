<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <body>
    <div class="row">
        <div class="col-sm-3 col-md-6 bg-warning">I am col 1        </div>

        <div class="col-sm-3 col-md-6 bg-danger">I am col 3</div>

        <div class="col-3 col-sm-4 col-md-6 col-lg-8 col-xl-12 bg-warning">col-3 col-sm-4 col-md-6 col-lg-8 col-xl-12 bg-warning</div>
