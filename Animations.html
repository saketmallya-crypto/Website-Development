<!DOCTYPE html>
<html>
<head>
    <title>
        Animations
    </title>
    <style>
        body{
            background:linear-gradient( -45deg, yellow,orange,red);
            background-size:300% 300%;
            animation:Wave 30s ease infinite;
        }
        @keyframes Wave{
            0%{
                background-position:0% 0%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-postion:0% 50%;
            }
        }
    </style>
</head>

</body>
</html>
