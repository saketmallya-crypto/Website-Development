<!DOCTYPE html>
<html>
    <head>
        <title>Feedback</title>
        <style>
            /*This is an element selector*/
            label{
                color:cadetblue
            }
            fieldset{
                border:5px dashed
            }
            /*This is an attribute selector*/
            input[
                type="checkbox"
                
            ]
            {
               width:30px;
               height:20px;
                color: aquamarine;
                outline:5px cadetblue;
            }
            /*Pseudo Classes*/
            input:focus{
                border:4px solid cadetblue;
            }
        </style>
    </head>
    <body>
        <form>
           <fieldset>
                <legend> Feedback Form</legend>
                <label> Teacher Name</label><br>
                <input type="text" id="teacher-name" placeholder="Enter your full name"><br><hr>
                <label>Teacher Email</label><br>
                <input type="email" id="email" value="xyz@gmail.com"><br><hr>
                <label> Teacher Age</label><br>
                <input type="number" id="age" required><br><hr>
                <label>Select your Date of Birth</label><br>
                <input type="date" id="date-of-birth" name="dob"><br><hr>
                <label>Gender</label><br>
                <input type="radio" id="Female" name="Gender">Female<br><hr>
                <input type="radio" id="Male" name="Gender">Male<br>
                <label> Subjects Taught</label><br>
                <input type="checkbox" id="Math" name="Subject"> Math<br>
                <input type="checkbox" id="Social Science" name="Subject"> Social Science<br>
                <input type="checkbox" id="English" name="Subject"> English<br>
                <input type="checkbox" id="Science" name="Subject"> Science<br>
                <label>Country</label>
                <select>
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                    <option>Senegal</option>
                    <option>Japan</option>
                </select><br>
                <label> Suggestions</label><br>
                <textarea rows="5" cols="20" maxlength="200"> </textarea><br>
                <button type="Submit">Submit</button>
                
           </fieldset> 
        </form>
    </body>
</html>
